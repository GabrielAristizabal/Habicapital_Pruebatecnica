services:
  postgres:
    image: postgres:16-alpine
    container_name: simple-bank-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-simple_bank}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/infrastructure/db/migrations/001_init_bank.sql:/docker-entrypoint-initdb.d/001_init_bank.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-simple_bank}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
